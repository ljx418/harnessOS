<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
    <style>
      .bg{fill:#f5f7fb}.panel{fill:#fff;stroke:#dbe3ee}.soft{fill:#f8fafc}.ink{fill:#111827}.muted{fill:#64748b}
      .blue{fill:#2563eb}.blueSoft{fill:#eff6ff}.green{fill:#16a34a}.amber{fill:#b45309}.red{fill:#dc2626}
      .title{font:800 30px Inter,Arial,"PingFang SC",sans-serif}.h{font:760 18px Inter,Arial,"PingFang SC",sans-serif}
      .t{font:500 14px Inter,Arial,"PingFang SC",sans-serif}.s{font:650 12px Inter,Arial,"PingFang SC",sans-serif}
      .arrow{stroke:#94a3b8;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <text x="56" y="72" class="title ink">用户交互体验流程 · 从自然语言到可审查提案</text>
  <text x="56" y="106" class="t muted">目标：用户每一步都能看到系统状态、Agent 责任、提案边界、质量与证据，不出现静默等待。</text>

  <g transform="translate(56 168)">
    <rect width="190" height="232" rx="18" class="panel" filter="url(#shadow)"/>
    <circle cx="32" cy="34" r="16" class="blue"/><text x="27" y="40" class="s" fill="#fff">1</text>
    <text x="58" y="40" class="h ink">输入目标</text>
    <rect x="24" y="72" width="142" height="84" rx="14" class="soft" stroke="#dbe3ee"/>
    <text x="40" y="102" class="s ink">Chat 工作台</text>
    <text x="40" y="128" class="s muted">多 Agent 讨论...</text>
    <rect x="24" y="174" width="92" height="26" rx="8" class="blueSoft"/><text x="38" y="191" class="s blue">receiving</text>
  </g>
  <path class="arrow" d="M260 284 C300 284 300 284 340 284"/>

  <g transform="translate(350 168)">
    <rect width="190" height="232" rx="18" class="panel" filter="url(#shadow)"/>
    <circle cx="32" cy="34" r="16" class="blue"/><text x="27" y="40" class="s" fill="#fff">2</text>
    <text x="58" y="40" class="h ink">生成提案</text>
    <rect x="24" y="72" width="142" height="104" rx="14" class="soft" stroke="#dbe3ee"/>
    <text x="40" y="100" class="s ink">WorkflowDiff</text>
    <text x="40" y="126" class="s muted">解析中</text>
    <text x="40" y="150" class="s muted">生成中</text>
    <rect x="24" y="190" width="120" height="26" rx="8" fill="#fff7ed"/><text x="38" y="207" class="s amber">awaiting confirm</text>
  </g>
  <path class="arrow" d="M554 284 C594 284 594 284 634 284"/>

  <g transform="translate(644 168)">
    <rect width="190" height="232" rx="18" class="panel" filter="url(#shadow)"/>
    <circle cx="32" cy="34" r="16" class="blue"/><text x="27" y="40" class="s" fill="#fff">3</text>
    <text x="58" y="40" class="h ink">画布预览</text>
    <rect x="24" y="72" width="142" height="104" rx="14" class="soft" stroke="#dbe3ee"/>
    <path d="M54 128 C80 108 104 108 134 128" stroke="#94a3b8" stroke-width="4" fill="none"/>
    <rect x="40" y="102" width="42" height="30" rx="8" class="panel"/><rect x="110" y="102" width="42" height="30" rx="8" class="panel"/>
    <rect x="24" y="190" width="86" height="26" rx="8" fill="#eff6ff"/><text x="38" y="207" class="s blue">只读图</text>
  </g>
  <path class="arrow" d="M848 284 C888 284 888 284 928 284"/>

  <g transform="translate(938 168)">
    <rect width="190" height="232" rx="18" class="panel" filter="url(#shadow)"/>
    <circle cx="32" cy="34" r="16" class="blue"/><text x="27" y="40" class="s" fill="#fff">4</text>
    <text x="58" y="40" class="h ink">检查节点</text>
    <rect x="24" y="72" width="142" height="104" rx="14" class="soft" stroke="#dbe3ee"/>
    <text x="40" y="102" class="s ink">角色/目标</text>
    <text x="40" y="128" class="s muted">工具 · 技能 · MCP</text>
    <text x="40" y="152" class="s muted">证据引用</text>
    <rect x="24" y="190" width="82" height="26" rx="8" fill="#ecfdf5"/><text x="38" y="207" class="s green">visible</text>
  </g>
  <path class="arrow" d="M1142 284 C1182 284 1182 284 1222 284"/>

  <g transform="translate(1232 168)">
    <rect width="152" height="232" rx="18" class="panel" filter="url(#shadow)"/>
    <circle cx="32" cy="34" r="16" class="blue"/><text x="27" y="40" class="s" fill="#fff">5</text>
    <text x="58" y="40" class="h ink">确认</text>
    <rect x="20" y="76" width="112" height="34" rx="9" fill="#2563eb"/><text x="46" y="98" class="s" fill="#fff">确认</text>
    <rect x="20" y="122" width="112" height="34" rx="9" class="soft" stroke="#dbe3ee"/><text x="46" y="144" class="s muted">修订</text>
    <rect x="20" y="168" width="112" height="34" rx="9" class="soft" stroke="#dbe3ee"/><text x="46" y="190" class="s muted">拒绝</text>
  </g>

  <g transform="translate(224 520)">
    <rect width="992" height="166" rx="20" class="panel" filter="url(#shadow)"/>
    <text x="28" y="42" class="h ink">状态机必须可见</text>
    <g transform="translate(28 70)">
      <rect width="76" height="30" rx="9" class="soft"/><text x="22" y="20" class="s muted">idle</text>
      <rect x="90" width="118" height="30" rx="9" class="blueSoft"/><text x="106" y="20" class="s blue">receiving input</text>
      <rect x="224" width="92" height="30" rx="9" class="blueSoft"/><text x="246" y="20" class="s blue">planning</text>
      <rect x="332" width="116" height="30" rx="9" fill="#fff7ed"/><text x="350" y="20" class="s amber">proposal ready</text>
      <rect x="464" width="142" height="30" rx="9" fill="#fff7ed"/><text x="482" y="20" class="s amber">awaiting confirm</text>
      <rect x="622" width="86" height="30" rx="9" class="blueSoft"/><text x="644" y="20" class="s blue">running</text>
      <rect x="724" width="98" height="30" rx="9" fill="#ecfdf5"/><text x="746" y="20" class="s green">completed</text>
      <rect x="838" width="92" height="30" rx="9" fill="#fef2f2"/><text x="860" y="20" class="s red">failed</text>
    </g>
    <text x="28" y="132" class="t muted">边界：设计原型，不作为运行证据；确认前不执行发布、运行或持久写入。</text>
  </g>
</svg>

