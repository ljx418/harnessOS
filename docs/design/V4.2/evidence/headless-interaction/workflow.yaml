stations:
  - station_id: folder_input
    name: "文件夹输入"
    station_kind: input
    description: "用户确认本地文件夹读取授权。"
    input_artifacts: [folder_ref]
    output_artifacts: [folder_ref]
  - station_id: folder_scan
    name: "递归扫描"
    station_kind: scan
    description: "递归扫描文件夹并返回只读文件树和统计。"
    input_artifacts: [folder_ref]
    output_artifacts: [file_tree]
  - station_id: markdown_filter
    name: "Markdown 过滤"
    station_kind: filter
    description: "筛选 Markdown 文件并记录 unsupported 文件。"
    input_artifacts: [file_tree]
    output_artifacts: [md_file_list]
  - station_id: markdown_parse
    name: "Markdown 解析"
    station_kind: parse
    description: "解析 Markdown 元数据。"
    input_artifacts: [md_file_list]
    output_artifacts: [parsed_docs]
  - station_id: folder_group
    name: "子文件夹分组"
    station_kind: group
    description: "按子文件夹对文档分组。"
    input_artifacts: [parsed_docs]
    output_artifacts: [grouped_docs]
  - station_id: per_folder_summary
    name: "子文件夹总结"
    station_kind: summarize
    description: "为每个含 Markdown 的子文件夹生成总结。"
    input_artifacts: [grouped_docs]
    output_artifacts: [folder_summaries]
  - station_id: overview_summary
    name: "总览总结"
    station_kind: summarize
    description: "生成跨子文件夹总览总结。"
    input_artifacts: [folder_summaries]
    output_artifacts: [overview_summary]
  - station_id: quality_check
    name: "质量检查"
    station_kind: quality
    description: "检查总结覆盖率、unsupported 文件和空文件夹。"
    input_artifacts: [folder_summaries, overview_summary]
    output_artifacts: [quality_report]
  - station_id: artifact_publish
    name: "产物发布"
    station_kind: publish_artifacts
    description: "发布只读总结与质量报告 artifacts。"
    input_artifacts: [folder_summaries, overview_summary, quality_report]
    output_artifacts: [output_package]
