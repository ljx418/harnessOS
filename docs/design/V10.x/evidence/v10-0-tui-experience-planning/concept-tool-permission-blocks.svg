<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460"><rect width="980" height="460" rx="0" fill="#020617" /><rect x="18" y="18" width="944" height="380" rx="10" fill="#0b1020" stroke="#334155" /><text x="34" y="52" font-size="20" font-weight="800" fill="#f8fafc">Tool Block And Permission Prompt</text><line x1="34" y1="58" x2="940" y2="58" stroke="#263244" /><text x="34" y="28" font-size="18" fill="#8bdaff">harnessOS  permission: on-request  sandbox: workspace-write</text><text x="34" y="78" font-size="18" fill="#fde68a">tool ▸ terminal.readonly_shell</text><text x="34" y="112" font-size="18" fill="#d7dee8">  command: ls docs/design/V9.x/evidence</text><text x="34" y="144" font-size="18" fill="#d7dee8">  risk: low  mutation: false  evidence: evd_tool_019</text><text x="34" y="204" font-size="18" fill="#fecaca">permission ▸ 需要确认</text><text x="34" y="238" font-size="18" fill="#f8fafc">  reason: 即将读取工作区证据目录</text><text x="34" y="272" font-size="18" fill="#bbf7d0">  [y] allow   [n] deny   [?] details</text><text x="34" y="358" font-size="18" fill="#94a3b8">denied reason 和 evidence ref 必须可见，不能隐藏在日志里</text><rect x="34" y="340" width="890" height="42" rx="8" fill="#111827" stroke="#475569" /><text x="50" y="367" font-size="17" fill="#94a3b8">›</text><text x="34" y="430" font-size="15" fill="#94a3b8">工具块、审批提示、forbidden reason 是一等 UI 元素</text></svg>