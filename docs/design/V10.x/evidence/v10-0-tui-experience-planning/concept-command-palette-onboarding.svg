<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460"><rect width="980" height="460" rx="0" fill="#020617" /><rect x="18" y="18" width="944" height="380" rx="10" fill="#0b1020" stroke="#334155" /><text x="34" y="52" font-size="20" font-weight="800" fill="#f8fafc">Slash Command Onboarding</text><line x1="34" y1="58" x2="940" y2="58" stroke="#263244" /><text x="34" y="28" font-size="18" fill="#8bdaff">harnessOS  /Users/Zhuanz/workspace  mode:default  evidence:ready</text><text x="34" y="78" font-size="18" fill="#f8fafc">你 &gt; /</text><text x="34" y="118" font-size="18" fill="#bbf7d0">command palette</text><text x="34" y="150" font-size="18" fill="#d7dee8">  /new        从自然语言目标创建工作流草案</text><text x="34" y="182" font-size="18" fill="#d7dee8">  /plan       展开当前计划 / todo</text><text x="34" y="214" font-size="18" fill="#d7dee8">  /stations   查看所有工位与 Agent 状态</text><text x="34" y="246" font-size="18" fill="#d7dee8">  /evidence   打开证据链与 runtime report</text><text x="34" y="278" font-size="18" fill="#d7dee8">  /diff       查看待确认 WorkflowDiff</text><text x="34" y="310" font-size="18" fill="#94a3b8">  /help       快捷键与安全边界</text><text x="34" y="374" font-size="18" fill="#94a3b8">输入消息或 /command</text><rect x="34" y="340" width="890" height="42" rx="8" fill="#111827" stroke="#475569" /><text x="50" y="367" font-size="17" fill="#94a3b8">›</text><text x="34" y="430" font-size="15" fill="#94a3b8">新用户先靠 /commands 上手，不需要理解内部文档</text></svg>